<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Fermer">&times;</button>
  <button class="lightbox-nav lightbox-prev" onclick="navLightbox(-1)" aria-label="Précédent">&#8249;</button>
  <img id="lightbox-img" src="" alt="">
  <p class="caption" id="lightbox-caption"></p>
  <button class="lightbox-nav lightbox-next" onclick="navLightbox(1)" aria-label="Suivant">&#8250;</button>
</div>

<script src="portfolio-kits-data.js"></script>
<script>
const kitGrid = document.getElementById('kit-grid');
const kitDetail = document.getElementById('kit-detail');
const kitDetailTitle = document.getElementById('kit-detail-title');
const kitDetailYears = document.getElementById('kit-detail-years');
const kitDetailGrid = document.getElementById('kit-detail-grid');

let currentKitImages = [];
let currentIndex = 0;

// Extract the last (or only) year from a "years" string like "2022-2023" or "2026"
// so kits can be sorted with the most recent / ongoing projects first.
function getSortYear(yearsStr) {
  const matches = yearsStr.match(/\d{4}/g);
  if (!matches) return 0;
  return parseInt(matches[matches.length - 1], 10);
}

// Build a sorted list of {kit, originalIndex} so clicks still reference
// the correct entry in the original portfolioKits array.
const sortedKits = portfolioKits
  .map((kit, originalIndex) => ({ kit, originalIndex }))
  .sort((a, b) => getSortYear(b.kit.years) - getSortYear(a.kit.years));

// Build the grid of kit cards, most recent first
sortedKits.forEach(({ kit, originalIndex }) => {
  const card = document.createElement('div');
  card.className = 'kit-card';
  card.onclick = () => openKitDetail(originalIndex);
  card.innerHTML = `
    <img class="kit-cover" src="${kit.cover}" alt="${kit.name}" loading="lazy">
    <div class="kit-info">
      <h3>${kit.name}</h3>
      <div class="kit-years">${kit.years}</div>
      <div class="kit-count">${kit.images.length} image${kit.images.length > 1 ? 's' : ''}</div>
    </div>
  `;
  kitGrid.appendChild(card);
});

function openKitDetail(kitIndex) {
  const kit = portfolioKits[kitIndex];
  currentKitImages = kit.images;

  kitDetailTitle.textContent = kit.name;
  kitDetailYears.textContent = kit.years;

  kitDetailGrid.innerHTML = '';
  kit.images.forEach((im, i) => {
    const fig = document.createElement('figure');
    fig.onclick = () => openLightbox(i);
    fig.innerHTML = `<img src="${im.local_path}" alt="${im.title}" loading="lazy"><figcaption>${im.title}</figcaption>`;
    kitDetailGrid.appendChild(fig);
  });

  // Fade out the grid, then swap to the detail view and fade it in
  kitGrid.classList.add('fading');

  setTimeout(() => {
    kitGrid.classList.add('hidden');
    kitGrid.classList.remove('fading');

    kitDetail.classList.add('open');
    // Force a reflow so the opacity transition triggers reliably
    void kitDetail.offsetWidth;
    kitDetail.classList.add('visible');
  }, 350);
}

function closeKitDetail(event) {
  if (event) event.preventDefault();
  const scrollBefore = window.scrollY;

  // Fade out the detail view, then swap back to the grid and fade it in
  kitDetail.classList.remove('visible');

  setTimeout(() => {
    kitDetail.classList.remove('open');

    kitGrid.classList.remove('hidden');
    kitGrid.classList.add('fading');
    void kitGrid.offsetWidth;
    kitGrid.classList.remove('fading');

    // Restore scroll position in case the browser shifted it during the transition
    window.scrollTo(0, scrollBefore);
  }, 350);
}

// Lightbox (operates on currentKitImages)
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxCaption = document.getElementById('lightbox-caption');

function openLightbox(index) {
  currentIndex = index;
  updateLightbox();
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

function navLightbox(direction) {
  currentIndex = (currentIndex + direction + currentKitImages.length) % currentKitImages.length;
  updateLightbox();
}

function updateLightbox() {
  const photo = currentKitImages[currentIndex];
  lightboxImg.src = photo.local_path;
  lightboxImg.alt = photo.title;
  lightboxCaption.textContent = photo.title;
}

lightbox.addEventListener('click', function(e) {
  if (e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', function(e) {
  if (lightbox.classList.contains('open')) {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
  } else if (kitDetail.classList.contains('open') && e.key === 'Escape') {
    closeKitDetail();
  }
});
</script>
